networks:
  payment-net:
    driver: bridge

volumes:
  postgres-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks: [payment-net]
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  stub-service:
    build:
      context: ../stub-service
      dockerfile: Dockerfile
    container_name: stub-service
    networks: [payment-net]
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SERVICE_NAME: payment-stub
      URL_PREFIX: ""
      API_PATH: /v3/api-docs
      SWAGGER_PATH: /swagger-ui.html
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    networks: [payment-net]
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payments
      DB_USER: payments
      DB_PASS: payments
      STUB_SERVICE_URL: http://stub-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      stub-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  k6:
    image: grafana/k6:0.51.0
    container_name: k6
    networks: [payment-net]
    volumes:
      - ./k6:/scripts
    command: run /scripts/load-test.js
    depends_on:
      payment-service:
        condition: service_healthy
    environment:
      BASE_URL: http://payment-service:8080
    profiles:
      - load-test
